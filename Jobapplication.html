<div class="container mt-5">

<h1 class="text-center mb-4">Job Application Form</h1>

<form>

<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label">First Name</label>
<input type="text" class="form-control" placeholder="Enter your first name" required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Last Name</label>
<input type="text" class="form-control" placeholder="Enter your last name" required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Email Address</label>
<input type="email" class="form-control" placeholder="Enter your email" required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Phone Number</label>
<input type="tel" class="form-control" placeholder="Enter your phone number" required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Position Applying For</label>
<input type="text" class="form-control" placeholder="Enter job position">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Upload CV</label>
<input type="file" class="form-control">
</div>

<div class="col-12 mb-3">
<label class="form-label">Why should we hire you?</label>
<textarea class="form-control" rows="4" placeholder="Write a short message"></textarea>
</div>

<div class="col-12 text-center">
<button type="submit" class="btn btn-dark">Submit Application</button>
</div>

</div>

</form>

</div>
